<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AIFX Registration</title>

  <!-- Font Prompt -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background: #000;
    }

    /* หน้าแรก */
    .home {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background-image:
        linear-gradient(
          rgba(0, 20, 60, 0.05),
          rgba(0, 20, 60, 0.35)
        ),
        url("images/cover1.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 24px 72px;
    }

    /* Bubble */
    .bubble {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;

      background: radial-gradient(circle at 30% 30%,
        rgba(255, 255, 255, 0.9),
        rgba(150, 220, 255, 0.28),
        rgba(255, 140, 230, 0.18),
        rgba(255, 255, 255, 0.04)
      );

      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.35),
        0 0 22px rgba(255, 255, 255, 0.25);

      backdrop-filter: blur(1px);
      animation: floatBubble 9s ease-in-out infinite;
    }

    .b1 {
      width: 90px;
      height: 90px;
      left: 8%;
      top: 70%;
      animation-duration: 10s;
    }

    .b2 {
      width: 55px;
      height: 55px;
      left: 28%;
      top: 62%;
      animation-duration: 8s;
      animation-delay: 1s;
    }

    .b3 {
      width: 120px;
      height: 120px;
      right: 10%;
      top: 55%;
      animation-duration: 12s;
      animation-delay: 1.5s;
    }

    .b4 {
      width: 45px;
      height: 45px;
      right: 25%;
      top: 18%;
      animation-duration: 7s;
      animation-delay: 0.5s;
    }

    .b5 {
      width: 70px;
      height: 70px;
      left: 55%;
      top: 30%;
      animation-duration: 11s;
      animation-delay: 2s;
    }

    .b6 {
      width: 38px;
      height: 38px;
      left: 75%;
      top: 72%;
      animation-duration: 9s;
      animation-delay: 1.2s;
    }

    .b7 {
      width: 110px;
      height: 110px;
      left: 15%;
      top: 20%;
      animation-duration: 13s;
      animation-delay: 2.4s;
    }

    @keyframes floatBubble {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0.65;
      }

      50% {
        transform: translateY(-55px) translateX(20px) scale(1.08);
        opacity: 1;
      }

      100% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0.65;
      }
    }

    .register-btn {
      position: relative;
      z-index: 2;
      width: 280px;
      padding: 16px 28px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f3c8a;
      font-family: "Prompt", sans-serif;
      font-size: 40px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      transition: 0.25s ease;
    }

    .register-btn:hover {
      transform: translateY(-3px);
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
    }

    /* หน้าฟอร์ม */
    .register-section {
      display: none;
      min-height: 100vh;
      background: linear-gradient(135deg, #eaf4ff, #ffffff);
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 32px;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 40, 100, 0.15);
    }

    .badge {
      display: inline-block;
      padding: 7px 14px;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 30px;
    }

    p {
      margin: 0 0 22px;
      color: #64748b;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-family: "Prompt", sans-serif;
      font-size: 15px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 16px;
      background: #2563eb;
      color: white;
      font-family: "Prompt", sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: white;
      color: #334155;
      font-family: "Prompt", sans-serif;
      font-size: 15px;
      cursor: pointer;
    }

    #message {
      margin-top: 18px;
      font-weight: 600;
      color: #2563eb;
      text-align: center;
    }

    @media (max-width: 768px) {
      .home {
        background-position: center;
        padding-bottom: 52px;
      }

      .register-btn {
        width: 240px;
        font-size: 30px;
      }

      .card {
        padding: 26px;
      }

      .b3 {
        width: 80px;
        height: 80px;
      }

      .b7 {
        width: 75px;
        height: 75px;
      }
    }
  </style>
</head>

<body>

  <!-- หน้าแรก -->
  <section id="home" class="home">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
    <div class="bubble b6"></div>
    <div class="bubble b7"></div>

    <button class="register-btn" onclick="showRegisterForm()">
      Register
    </button>
  </section>

  <!-- หน้าฟอร์มลงทะเบียน -->
  <section id="register" class="register-section">
    <div class="card">
      <div class="badge">EVENT REGISTRATION</div>

      <h1>AIFX Registration</h1>
      <p>กรอกข้อมูลเพื่อลงทะเบียนเข้าร่วมงาน</p>

      <form id="registerForm">
        <input type="text" name="fullName" placeholder="ชื่อ-นามสกุล" required>
        <input type="email" name="email" placeholder="อีเมล" required>
        <input type="tel" name="phone" placeholder="เบอร์โทร" required>
        <input type="text" name="organization" placeholder="มหาวิทยาลัย / บริษัท">

        <button type="submit" class="submit-btn">ลงทะเบียน</button>
      </form>

      <button class="back-btn" onclick="goHome()">กลับหน้าแรก</button>

      <div id="message"></div>
    </div>
  </section>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxB3CaeeKFO1hNHg_7j5crKChXFI6b4sBHol4Ty0ffQwC2x7WiLETGZ7WpAamZzEIvIhA/exec";

    function showRegisterForm() {
      document.getElementById("home").style.display = "none";
      document.getElementById("register").style.display = "flex";
    }

    function goHome() {
      document.getElementById("register").style.display = "none";
      document.getElementById("home").style.display = "flex";
    }

    const form = document.getElementById("registerForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      message.textContent = "กำลังบันทึกข้อมูล...";

      const formData = new FormData(form);

      fetch(SCRIPT_URL, {
        method: "POST",
        body: formData,
        mode: "no-cors"
      })
      .then(() => {
        message.textContent = "ลงทะเบียนสำเร็จ";
        form.reset();
      })
      .catch(() => {
        message.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่";
      });
    });
  </script>

</body>
</html>
