<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AIFX Registration</title>

  <!-- Font Prompt -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background: #000;
    }

    /* หน้าแรก */
    .home {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background-image:
        linear-gradient(
          rgba(0, 20, 60, 0.05),
          rgba(0, 20, 60, 0.35)
        ),
        url("images/cover2.png?v=2");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 24px 72px;
    }

    /* ฟองสบู่ PNG */
    .real-bubble {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      opacity: 0.95;
      animation: bubbleFloat 8s ease-in-out infinite;
    }

    .rb1 {
      width: 240px;
      left: 3%;
      top: 4%;
      animation-duration: 11s;
      animation-delay: 0s;
    }

    .rb2 {
      width: 100px;
      left: 31%;
      top: 2%;
      animation-duration: 8s;
      animation-delay: 0.8s;
    }

    .rb3 {
      width: 70px;
      left: 58%;
      top: 6%;
      animation-duration: 7s;
      animation-delay: 1.2s;
    }

    .rb4 {
      width: 230px;
      right: 2%;
      top: 12%;
      animation-duration: 10s;
      animation-delay: 1.5s;
    }

    .rb5 {
      width: 360px;
      right: 11%;
      bottom: 12%;
      animation-duration: 9s;
      animation-delay: 0.5s;
    }

    @keyframes bubbleFloat {
      0% {
        transform: translateY(0) translateX(0) scale(1);
      }

      50% {
        transform: translateY(-28px) translateX(14px) scale(1.03);
      }

      100% {
        transform: translateY(0) translateX(0) scale(1);
      }
    }

    .register-btn {
      position: relative;
      z-index: 2;
      width: 280px;
      padding: 16px 18px;
      border: none;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.92);
      color: #ffffff;
      font-family: "Prompt", sans-serif;
      font-size: 40px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      transition: 0.25s ease;
    }

    .register-btn:hover {
      transform: translateY(-3px);
      background: #000000;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
    }

    /* หน้าฟอร์ม */
    .register-section {
      display: none;
      min-height: 100vh;
      background: linear-gradient(135deg, #eaf4ff, #ffffff);
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 32px;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 40, 100, 0.15);
    }

    .badge {
      display: inline-block;
      padding: 7px 14px;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 30px;
    }

    p {
      margin: 0 0 22px;
      color: #64748b;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-family: "Prompt", sans-serif;
      font-size: 15px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 16px;
      background: #2563eb;
      color: white;
      font-family: "Prompt", sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: white;
      color: #334155;
      font-family: "Prompt", sans-serif;
      font-size: 15px;
      cursor: pointer;
    }

    #message {
      margin-top: 18px;
      font-weight: 600;
      color: #2563eb;
      text-align: center;
    }

    /* มือถือ */
    @media (max-width: 768px) {
      .home {
        background-position: center;
        padding-bottom: 52px;
      }

      .register-btn {
        width: 240px;
        font-size: 30px;
      }

      .card {
        padding: 26px;
      }

      .rb1 {
        width: 135px;
        left: 2%;
        top: 7%;
      }

      .rb2 {
        width: 65px;
        left: 35%;
        top: 8%;
      }

      .rb3 {
        width: 50px;
        left: 60%;
        top: 9%;
      }

      .rb4 {
        width: 130px;
        right: -4%;
        top: 16%;
      }

      .rb5 {
        width: 210px;
        right: 4%;
        bottom: 18%;
      }
    }
  </style>
</head>

<body>

  <!-- หน้าแรก -->
  <section id="home" class="home">
    <img src="images/bubble1.png?v=2" class="real-bubble rb1" alt="bubble">
    <img src="images/bubble2.png?v=2" class="real-bubble rb2" alt="bubble">
    <img src="images/bubble3.png?v=2" class="real-bubble rb3" alt="bubble">
    <img src="images/bubble4.png?v=2" class="real-bubble rb4" alt="bubble">
    <img src="images/bubble5.png?v=2" class="real-bubble rb5" alt="bubble">

    <button class="register-btn" onclick="showRegisterForm()">
      Register
    </button>
  </section>

  <!-- หน้าฟอร์มลงทะเบียน -->
  <section id="register" class="register-section">
    <div class="card">
      <div class="badge">EVENT REGISTRATION</div>

      <h1>AIFX Registration</h1>
      <p>กรอกข้อมูลเพื่อลงทะเบียนเข้าร่วมงาน</p>

      <form id="registerForm">
        <input type="text" name="fullName" placeholder="ชื่อ-นามสกุล" required>
        <input type="email" name="email" placeholder="อีเมล" required>
        <input type="tel" name="phone" placeholder="เบอร์โทร" required>
        <input type="text" name="organization" placeholder="มหาวิทยาลัย / บริษัท">

        <button type="submit" class="submit-btn">ลงทะเบียน</button>
      </form>

      <button class="back-btn" onclick="goHome()">กลับหน้าแรก</button>

      <div id="message"></div>
    </div>
  </section>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxB3CaeeKFO1hNHg_7j5crKChXFI6b4sBHol4Ty0ffQwC2x7WiLETGZ7WpAamZzEIvIhA/exec";

    function showRegisterForm() {
      document.getElementById("home").style.display = "none";
      document.getElementById("register").style.display = "flex";
    }

    function goHome() {
      document.getElementById("register").style.display = "none";
      document.getElementById("home").style.display = "flex";
    }

    const form = document.getElementById("registerForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      message.textContent = "กำลังบันทึกข้อมูล...";

      const formData = new FormData(form);

      fetch(SCRIPT_URL, {
        method: "POST",
        body: formData,
        mode: "no-cors"
      })
      .then(() => {
        message.textContent = "ลงทะเบียนสำเร็จ";
        form.reset();
      })
      .catch(() => {
        message.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่";
      });
    });
  </script>

</body>
</html>
