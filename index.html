<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIFX Event</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
    }

    .hero-aifx {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #0875c9;
    }

    /* พื้นหลังหลัก */
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }

    /* ฟองสบู่ */
    .bubble {
      position: absolute;
      z-index: 3;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    .bubble-01 {
      left: 3%;
      top: 11%;
      width: 19%;
    }

    .bubble-02 {
      left: 35%;
      top: 7%;
      width: 9.5%;
    }

    .bubble-03 {
      left: 8.2%;
      top: 55%;
      width: 14%;
    }

    .bubble-04 {
      right: 3.5%;
      top: 30%;
      width: 15%;
    }

    /* โลโก้ CEA / TCDC */
    .logo-group {
      position: absolute;
      top: 5%;
      right: 4%;
      z-index: 5;

      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo-cea {
      width: 110px;
      height: auto;
      display: block;
    }

    .logo-tcdc {
      width: 120px;
      height: auto;
      display: block;
    }

    /* วันเวลา */
    .event-date {
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translateX(-50%);
      z-index: 6;

      color: #000000;
      font-size: clamp(24px, 2.7vw, 52px);
      font-weight: 400;
      letter-spacing: 1px;
      line-height: 1.2;
      white-space: nowrap;
    }

    /* ปุ่ม Register */
    .register-btn {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 6;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 18px 48px;
      border-radius: 999px;
      background: #000000;
      color: #ffffff;

      font-size: clamp(24px, 2.7vw, 48px);
      font-weight: 800;
      line-height: 1;
      text-decoration: none;

      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .register-btn:hover {
      transform: translateX(-50%) scale(1.04);
      opacity: 0.9;
    }

    /* =========================
       TABLET
    ========================= */
    @media (max-width: 1024px) {
      .bubble-01 {
        left: 3%;
        top: 12%;
        width: 23%;
      }

      .bubble-02 {
        left: 36%;
        top: 8%;
        width: 12%;
      }

      .bubble-03 {
        left: 7%;
        top: 56%;
        width: 17%;
      }

      .bubble-04 {
        right: 3%;
        top: 33%;
        width: 18%;
      }

      .logo-group {
        top: 5%;
        right: 4%;
        gap: 18px;
      }

      .logo-cea {
        width: 90px;
      }

      .logo-tcdc {
        width: 100px;
      }

      .event-date {
        top: 57%;
        font-size: clamp(22px, 3vw, 42px);
      }

      .register-btn {
        bottom: 8%;
        padding: 16px 42px;
        font-size: clamp(24px, 3vw, 40px);
      }
    }

    /* =========================
       MOBILE
    ========================= */
    @media (max-width: 768px) {
      .hero-aifx {
        min-height: 100svh;
      }

      .hero-bg {
        object-fit: cover;
        object-position: center;
      }

      .bubble-01 {
        left: 2%;
        top: 12%;
        width: 34%;
      }

      .bubble-02 {
        left: 44%;
        top: 10%;
        width: 18%;
      }

      .bubble-03 {
        left: 6%;
        top: 57%;
        width: 24%;
      }

      .bubble-04 {
        right: 2%;
        top: 34%;
        width: 26%;
      }

      .logo-group {
        top: 4%;
        right: 4%;
        gap: 12px;
      }

      .logo-cea {
        width: 62px;
      }

      .logo-tcdc {
        width: 72px;
      }

      .event-date {
        top: 55%;
        font-size: clamp(16px, 4.2vw, 26px);
        letter-spacing: 0.5px;
      }

      .register-btn {
        bottom: 8%;
        padding: 14px 34px;
        font-size: clamp(22px, 6vw, 34px);
      }
    }

    /* =========================
       SMALL MOBILE
    ========================= */
    @media (max-width: 480px) {
      .bubble-01 {
        width: 38%;
      }

      .bubble-02 {
        width: 20%;
      }

      .bubble-03 {
        width: 27%;
      }

      .bubble-04 {
        width: 29%;
      }

      .logo-group {
        gap: 10px;
      }

      .logo-cea {
        width: 54px;
      }

      .logo-tcdc {
        width: 64px;
      }

      .event-date {
        font-size: 15px;
      }

      .register-btn {
        padding: 12px 28px;
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero-aifx">
      <!-- Background -->
      <img
        class="hero-bg"
        src="assets/cover.png"
        alt="AIFX event background"
      />

      <!-- Bubble PNG -->
      <img
        class="bubble bubble-01"
        src="assets/bubble01.png"
        alt="bubble 01"
      />

      <img
        class="bubble bubble-02"
        src="assets/bubble02.png"
        alt="bubble 02"
      />

      <img
        class="bubble bubble-03"
        src="assets/bubble03.png"
        alt="bubble 03"
      />

      <img
        class="bubble bubble-04"
        src="assets/bubble04.png"
        alt="bubble 04"
      />

      <!-- CEA / TCDC Logo -->
      <div class="logo-group">
        <img
          class="logo-cea"
          src="assets/cea-logo.png"
          alt="CEA logo"
        />

        <img
          class="logo-tcdc"
          src="assets/tcdc-logo.png"
          alt="TCDC logo"
        />
      </div>

      <!-- Date / Time -->
      <div class="event-date">
        18 JULY 2026 | 13.00 - 18.00
      </div>

      <!-- Register Button -->
      <a href="#" class="register-btn">
        Register
      </a>
    </section>
  </main>
</body>
</html>
